<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Expense Tracker</h2>
  <table class="table table-bordered">
    <thead>
    <tr>
      <th>Expense Amount</th>
      <th>Category</th>
      <th>Description</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody id="expenseTable">
    <!-- Existing data will be appended here -->
    </tbody>
    <tfoot>
    <tr>
      <td colspan="4">
        <form onsubmit="return addBill()">
          <!--th:action="@{/saveBill}" th:object="${Bill}" method="POST"-->
          <div class="row mb-3">
            <div class="col">
              <input type="number" id="billAmount1" class="form-control" placeholder="Amount">
              <!--th:field="*{billAmount}"-->
            </div>
            <div class="col">
              <input type="date" id="billDueDate1" class="form-control" placeholder="Due Date">
              <!-- th:field="*{billDueDate}"-->
            </div>
            <div class="col">
              <input type="text" id="billDescription1" class="form-control" placeholder="Description">
              <!--th:field="*{billDescription}"-->
            </div>
            <div class="col">
              <button type="submit" class="btn btn-primary">Add</button>
            </div>
          </div>
        </form>
      </td>
    </tr>
    </tfoot>
  </table>
</div>

<script>
  function addBill() {
    var table = document.getElementById("expenseTable");
    var row = table.insertRow(0); // Insert new row at the top
    var cell1 = row.insertCell(0);
    var cell2 = row.insertCell(1);
    var cell3 = row.insertCell(2);
    var cell4 = row.insertCell(3);

    var billAmount = document.getElementById("billAmount1").value;
    var billDueDate = document.getElementById("billDueDate1").value;
    var billDescription = document.getElementById("billDescription1").value;

    cell1.textContent = billAmount;
    cell2.textContent = billDueDate;
    cell3.textContent = billDescription;
    cell4.innerHTML = '<button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>';

    // Clear input fields
    document.getElementById("billAmount1").value = "";
    document.getElementById("billDueDate1").value = "";
    document.getElementById("billDescription1").value = "";

    // Prevent the form from submitting
    return false;
  }

  function deleteRow(button) {
    var row = button.parentNode.parentNode;
    row.parentNode.removeChild(row);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
